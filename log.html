  <style>
    /* ── PAGE-SPECIFIC: LOG ── */
    .container {
      max-width: 800px;
      padding: 6rem 2rem 4rem;
    }

    .back {
      display: inline-block;
      font-size: 0.75rem;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 1.2rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 3rem;
    }

    /* ── VERSION BADGES ── */
    .version-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }
    .version-badge {
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--card-border);
      border-radius: 20px;
      color: var(--text-dim);
      transition: all 0.2s;
      cursor: default;
    }
    .version-badge.current {
      border-color: var(--text);
      color: var(--text);
    }

    /* ── DATE GROUP ── */
    .date-group {
      margin-bottom: 2.5rem;
    }
    .date-header {
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--card-border);
    }

    /* ── LOG ENTRY ── */
    .log-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0;
      transition: color 0.2s;
    }
    .log-item:hover { color: var(--text); }

    .log-dot { display:none; }
    .log-status { font-size:0.75rem; letter-spacing:2px; flex-shrink:0; padding:0.25rem 0.6rem; border-radius:100px; margin-left:auto; }
    .log-status.c-yellow { color:var(--yellow); background:rgba(245,196,0,0.08); }
    .log-status.c-cyan { color:var(--cyan); background:rgba(0,186,223,0.08); }
    .log-status.c-blue { color:var(--blue); background:rgba(59,110,245,0.08); }
    .log-status.c-pink { color:var(--pink); background:rgba(232,25,122,0.08); }

    .log-text {
      font-size: 0.75rem;
      color: var(--text-dim);
      line-height: 1.7;
    }
    .log-item:hover .log-text { color: var(--text); }

    .log-tag {
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .tag-version { background: rgba(0,186,223,0.12); color: var(--cyan); }
    .tag-feature { background: rgba(245,196,0,0.12); color: var(--yellow); }
    .tag-fix { background: rgba(232,25,122,0.12); color: var(--pink); }

    .stats-row {
      display: flex;
      gap: 2rem;
      margin-bottom: 3rem;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 0.75rem; letter-spacing: 2px; color: var(--text-muted); margin-top: 0.2rem; }

    @media (max-width: 600px) {
      .container { padding: 4rem 1.25rem 3rem; }
      .stats-row { gap: 1rem; }
      .log-item { gap:0.5rem; }
      .log-text { font-size:0.75rem; }
      .log-status { font-size:0.75rem; padding:0.2rem 0.5rem; }
    }
  </style>
</head>

      // 25.03.2026
      { date: "25.03.2026", text: "v0.3 — story, tagteach, clicker training, AI pages launched", type: "major" },
      { date: "25.03.2026", text: "Mobile product layout optimized", type: "fix" },

      { date: "25.03.2026", text: "Contact email added across all service pages", type: "feature" },

      // 24.03.2026
      { date: "24.03.2026", text: "v0.2 redesign: light mode, glassmorphic cards, floating nav, bento grid, grain texture", type: "major" },
      { date: "24.03.2026", text: "Email subscribe + daily WHOOP automation setup", type: "feature" },

      { date: "24.03.2026", text: "WHOOP integration — live biometric data on site", type: "major" },
      { date: "24.03.2026", text: "Privacy policy page for WHOOP API", type: "feature" },
      { date: "24.03.2026", text: "v0.2 shipped — glitch effect, scroll reveals, hidden terminal", type: "major" },
      { date: "24.03.2026", text: "v0.1 — initial commit. protocol initiated. site live.", type: "major" }
    ];

    // Stats
    document.getElementById('totalChanges').textContent = entries.length;
    var uniqueDates = {};
    entries.forEach(function(e) { uniqueDates[e.date] = true; });
    document.getElementById('totalDays').textContent = Object.keys(uniqueDates).length;

    // Group by date
    var grouped = {};
    entries.forEach(function(e) {
      if (!grouped[e.date]) grouped[e.date] = [];
      grouped[e.date].push(e);
    });

    var container = document.getElementById('logContainer');
    var dates = Object.keys(grouped);

    dates.forEach(function(date) {
      var group = document.createElement('div');
      group.className = 'date-group';

      var header = document.createElement('div');
      header.className = 'date-header';
      header.textContent = date;
      group.appendChild(header);

      grouped[date].forEach(function(entry) {
        var item = document.createElement('div');
        item.className = 'log-item ' + entry.type;

        var dot = document.createElement('div');
        dot.className = 'log-dot';

        var text = document.createElement('div');
        text.className = 'log-text';
        text.textContent = entry.text;

        var colors = ['c-yellow','c-cyan','c-blue','c-pink'];
        var status = document.createElement('span');
        status.className = 'log-status ' + colors[group.querySelectorAll('.log-item').length % 4];
        status.textContent = 'DONE';

        if (entry.type === 'major') {
          var tag = document.createElement('span');
          tag.className = 'log-tag tag-version';
          tag.textContent = 'RELEASE';
          text.appendChild(tag);
        }

        item.appendChild(text);
        item.appendChild(status);
        group.appendChild(item);
      });

      container.appendChild(group);
    });

  </script>
