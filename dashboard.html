<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — NextElite Protocol</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="description" content="Live biometric dashboard — WHOOP recovery, strain, sleep, HRV trends. The protocol in numbers." />
  <meta property="og:title" content="Dashboard — NextElite Protocol" />
  <meta property="og:description" content="Live biometric data. Recovery, strain, sleep, HRV trends." />
  <meta property="og:image" content="https://n3xt3lit3.github.io/nextelite-protocol/1500x500.jpeg" />
  <meta name="twitter:card" content="summary_large_image" />
  <script>var s=localStorage.getItem('nextelite-theme');if(s)document.documentElement.setAttribute('data-theme',s);</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    :root {
      --yellow: #F5C400;
      --cyan: #00BADF;
      --blue: #3B6EF5;
      --pink: #E8197A;
      --green: #22c55e;
      --purple: #a855f7;
    }

    [data-theme="dark"] {
      --bg: #050505;
      --bg-raised: #0a0a0c;
      --card: #0c0c0e;
      --card-border: #1a1a1e;
      --card-glass: rgba(12,12,14,0.6);
      --text: #e4e4e7;
      --text-dim: #52525b;
      --text-muted: #3f3f46;
      --grain-opacity: 0.03;
    }

    [data-theme="light"] {
      --bg: #fafafa;
      --bg-raised: #f4f4f5;
      --card: #ffffff;
      --card-border: #e4e4e7;
      --card-glass: rgba(255,255,255,0.6);
      --text: #18181b;
      --text-dim: #71717a;
      --text-muted: #a1a1aa;
      --grain-opacity: 0.02;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    a { color: inherit; text-decoration: none; }

    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 0 4rem;
    }

    .back {
      font-size: 0.5rem;
      letter-spacing: 2px;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .back:hover { color: var(--text); }

    .theme-toggle {
      width: 36px; height: 20px;
      border-radius: 100px;
      border: 1px solid var(--card-border);
      background: var(--bg-raised);
      cursor: pointer;
      position: relative;
      transition: background 0.3s, border-color 0.3s;
    }
    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: transform 0.3s, background 0.3s;
    }
    [data-theme="light"] .theme-toggle::after {
      transform: translateX(16px);
      background: var(--text);
    }

    .page-title {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .page-sub {
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.42rem;
      letter-spacing: 2px;
      color: var(--green);
      margin-bottom: 4rem;
    }
    .live-badge .dot {
      width: 5px; height: 5px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .section-label {
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .section-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── CURRENT STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .stats-grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 4rem;
    }
    .stat-card {
      background: var(--card-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      transition: background 0.3s, transform 0.3s;
    }
    .stat-card:hover { background: var(--card); transform: translateY(-2px); }
    .stat-val {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .stat-label {
      font-size: 0.42rem;
      letter-spacing: 2.5px;
      color: var(--text-muted);
    }

    /* ── BAR CHARTS ── */
    .chart-section { margin-bottom: 4rem; }
    .chart-container {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 120px;
      padding: 0;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 0.5rem;
    }
    .chart-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }
    .chart-bar {
      width: 100%;
      max-width: 40px;
      border-radius: 4px 4px 0 0;
      transition: height 1s ease;
      position: relative;
      cursor: default;
    }
    .chart-bar:hover { opacity: 0.8; }
    .chart-bar-val {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.45rem;
      font-weight: 700;
      color: var(--text-dim);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .chart-bar:hover .chart-bar-val { opacity: 1; }
    .chart-labels {
      display: flex;
      gap: 4px;
    }
    .chart-label {
      flex: 1;
      text-align: center;
      font-size: 0.38rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      max-width: 40px;
    }

    /* ── TREND LINE ── */
    .trend-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--card-border);
    }
    .trend-row:last-child { border-bottom: none; }
    .trend-date {
      font-size: 0.5rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      min-width: 50px;
    }
    .trend-bars {
      flex: 1;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .trend-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--card-border);
      border-radius: 3px;
      overflow: hidden;
    }
    .trend-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 1s ease;
    }
    .trend-val {
      font-size: 0.55rem;
      font-weight: 700;
      min-width: 40px;
      text-align: right;
    }

    /* ── AVERAGES ── */
    .avg-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 4rem;
    }
    .avg-card {
      padding: 1.5rem;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      transition: border-color 0.3s;
    }
    .avg-label {
      font-size: 0.42rem;
      letter-spacing: 2.5px;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .avg-val {
      font-size: 1.4rem;
      font-weight: 700;
    }
    .avg-sub {
      font-size: 0.5rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--card-border);
      margin: 0 0 4rem;
    }

    @media (max-width: 540px) {
      .stats-grid { grid-template-columns: 1fr; }
      .stats-grid-2 { grid-template-columns: 1fr; }
      .avg-grid { grid-template-columns: 1fr; }
    }

    .footer-back {
      text-align: center;
      padding: 4rem 0 2rem;
    }
    .socials { display:flex; justify-content:center; gap:1.2rem; margin-top:1rem; }
    .social-link { display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:50%; border:1px solid var(--card-border); color:var(--text-muted); transition:color 0.2s, border-color 0.2s, background 0.2s; }
    .social-link:hover { color:var(--text); border-color:var(--text-dim); background:var(--card); }
    .social-link svg { width:14px; height:14px; fill:currentColor; }

    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

      <div class="chart-labels" id="hrvLabels"></div>
    </div>

    <hr class="divider" />

    <!-- 10-DAY AVERAGES -->
    <div class="reveal">
      <div class="section-label"><span class="section-dot" style="background:var(--text-muted);"></span> 10-DAY AVERAGES</div>

    <!-- DAILY LOG -->
    <div class="reveal">
      <div class="section-label"><span class="section-dot" style="background:var(--pink);"></span> RECOVERY LOG</div>
      <div id="recoveryLog"></div>
    </div>

    <div class="footer-back">
      <a href="index.html" class="back">&lt;-- BACK TO PROTOCOL</a>
      <div class="socials">

  </div>

  <script>
    /* ── THEME ── */
    var toggle = document.getElementById('themeToggle');
    var html = document.documentElement;
    toggle.addEventListener('click', function() {
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('nextelite-theme', next);
    });

    /* ── REVEAL ── */
    var reveals = document.querySelectorAll('.reveal');
    var obs = new IntersectionObserver(function(entries) { entries.forEach(function(e) { if(e.isIntersecting) e.target.classList.add('visible'); }); }, {threshold:0.1});
    reveals.forEach(function(el) { obs.observe(el); });

    /* ── DATA ── */
    var historyData = [];

    function recoveryColor(val) {
      if (val >= 67) return 'var(--green)';
      if (val >= 34) return 'var(--yellow)';
      return 'var(--pink)';
    }

    function buildChart(containerId, labelId, data, key, maxVal, color) {
      var container = document.getElementById(containerId);
      var labels = document.getElementById(labelId);
      container.innerHTML = '';
      labels.innerHTML = '';
      data.forEach(function(d) {
        var val = d[key];
        if (val === undefined || val === null) return;
        var pct = Math.min((val / maxVal) * 100, 100);
        var barColor = key === 'recovery' ? recoveryColor(val) : color;
        var wrap = document.createElement('div');
        wrap.className = 'chart-bar-wrap';
        wrap.innerHTML = '<div class="chart-bar" style="height:' + pct + '%;background:' + barColor + ';"><div class="chart-bar-val">' + (key === 'strain' ? val.toFixed(1) : Math.round(val)) + '</div></div>';
        container.appendChild(wrap);

        var lbl = document.createElement('div');
        lbl.className = 'chart-label';
        lbl.textContent = d.date.slice(5);
        labels.appendChild(lbl);
      });
    }

    function buildAverages(data) {
      var grid = document.getElementById('avgGrid');
      var metrics = [
        { key: 'recovery', label: 'AVG RECOVERY', suffix: '%', color: 'var(--green)' },
        { key: 'strain', label: 'AVG STRAIN', suffix: '', color: 'var(--blue)', decimals: 1 },
        { key: 'hrv', label: 'AVG HRV', suffix: ' ms', color: 'var(--cyan)' },
        { key: 'rhr', label: 'AVG RHR', suffix: ' bpm', color: 'var(--pink)' }
      ];
      grid.innerHTML = '';
      metrics.forEach(function(m) {
        var vals = data.filter(function(d) { return d[m.key] !== undefined && d[m.key] !== null; }).map(function(d) { return d[m.key]; });
        if (vals.length === 0) return;
        var avg = vals.reduce(function(a, b) { return a + b; }, 0) / vals.length;
        var min = Math.min.apply(null, vals);
        var max = Math.max.apply(null, vals);
        var card = document.createElement('div');
        card.className = 'avg-card';
        card.innerHTML = '<div class="avg-label">' + m.label + '</div>' +
          '<div class="avg-val" style="color:' + m.color + ';">' + (m.decimals ? avg.toFixed(m.decimals) : Math.round(avg)) + m.suffix + '</div>' +
          '<div class="avg-sub">range: ' + (m.decimals ? min.toFixed(m.decimals) : Math.round(min)) + ' — ' + (m.decimals ? max.toFixed(m.decimals) : Math.round(max)) + '</div>';
        grid.appendChild(card);
      });
    }

    function buildRecoveryLog(data) {
      var log = document.getElementById('recoveryLog');
      log.innerHTML = '';
      var sorted = data.slice().reverse();
      sorted.forEach(function(d) {
        if (d.recovery === undefined || d.recovery === null) return;
        var row = document.createElement('div');
        row.className = 'trend-row';
        row.innerHTML =
          '<div class="trend-date">' + d.date.slice(5) + '</div>' +
          '<div class="trend-bars">' +
            '<div class="trend-bar-wrap"><div class="trend-bar" style="width:' + d.recovery + '%;background:' + recoveryColor(d.recovery) + ';"></div></div>' +
          '</div>' +
          '<div class="trend-val" style="color:' + recoveryColor(d.recovery) + ';">' + Math.round(d.recovery) + '%</div>';
        log.appendChild(row);
      });
    }

    /* ── FETCH RAW DATA ── */
    Promise.all([
      fetch('whoop_data.json').then(function(r) { return r.json(); }),
      fetch('whoop_raw.json').then(function(r) { return r.json(); })
    ]).then(function(results) {
      var current = results[0];
      var raw = results[1];

      /* Current stats */
      if (current.recovery !== null) document.getElementById('curRecovery').textContent = Math.round(current.recovery) + '%';
      if (current.strain !== null) document.getElementById('curStrain').textContent = current.strain.toFixed(1);
      if (current.sleep_hours !== null) document.getElementById('curSleep').textContent = current.sleep_hours.toFixed(1) + 'h';
      if (current.hrv !== null) document.getElementById('curHRV').textContent = Math.round(current.hrv);
      if (current.rhr !== null) document.getElementById('curRHR').textContent = Math.round(current.rhr);

      /* Build history from raw */
      var cycles = {};
      var recovery = {};
      var sleep = {};

      (raw.cycles.records || []).forEach(function(c) {
        if (c.score && c.start) cycles[c.start.slice(0, 10)] = c.score;
      });
      (raw.recovery.records || []).forEach(function(r) {
        if (r.score && r.created_at) recovery[r.created_at.slice(0, 10)] = r.score;
      });
      (raw.sleep.records || []).forEach(function(s) {
        if (s.score && s.start) sleep[s.start.slice(0, 10)] = s.score;
      });

      var allDates = {};
      Object.keys(cycles).forEach(function(d) { allDates[d] = true; });
      Object.keys(recovery).forEach(function(d) { allDates[d] = true; });
      var dates = Object.keys(allDates).sort();

      historyData = dates.map(function(d) {
        var c = cycles[d] || {};
        var r = recovery[d] || {};
        var s = sleep[d] || {};
        var sleepMs = (s.stage_summary || {}).total_in_bed_time_milli;
        return {
          date: d,
          strain: c.strain,
          recovery: r.recovery_score,
          hrv: r.hrv_rmssd_milli,
          rhr: r.resting_heart_rate,
          sleepHrs: sleepMs ? (sleepMs / 3600000).toFixed(1) : null
        };
      });

      /* Build charts */
      buildChart('recoveryChart', 'recoveryLabels', historyData, 'recovery', 100, 'var(--green)');
      buildChart('strainChart', 'strainLabels', historyData, 'strain', 21, 'var(--blue)');
      buildChart('hrvChart', 'hrvLabels', historyData, 'hrv', 200, 'var(--cyan)');
      buildAverages(historyData);
