    console.log('%c <333 xxx n3xt3lit3 ', 'color:#E8197A;font-family:monospace;padding:2px 0;');

    // Easter egg: click the logo 7 times to trigger aurora burst
    let logoClicks = 0;
    document.querySelector('.logo').addEventListener('click', function() {
      logoClicks++;
      if (logoClicks === 7) {
        const bg = document.querySelector('.gradient-bg');
        bg.style.transition = 'opacity 0.5s';
        bg.querySelector(':before') // can't select pseudo, so we use a class
        document.body.style.setProperty('--aurora-burst', '1');
        // Flash the gradient to full opacity briefly
        const flash = document.createElement('div');
        flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;background:radial-gradient(circle at 50% 50%,rgba(245,196,0,0.15),rgba(0,186,223,0.1),rgba(59,110,245,0.1),rgba(232,25,122,0.08));opacity:0;transition:opacity 1s;';
        document.body.appendChild(flash);
        requestAnimationFrame(() => { flash.style.opacity = '1'; });
        setTimeout(() => { flash.style.opacity = '0'; }, 2000);
        setTimeout(() => { flash.remove(); }, 3000);
        logoClicks = 0;
      }
    });
