    // Easter egg: hold down any letter for 3 seconds to see it grow
    let holdTimer = null;
    let activeKey = null;

    document.addEventListener('keydown', function(e) {
      if (e.key === activeKey) return;
      activeKey = e.key;
      holdTimer = setTimeout(function() {
        const statement = document.querySelector('.statement');
        statement.style.transition = 'font-size 0.8s cubic-bezier(0.25,0.46,0.45,0.94)';
        statement.style.fontSize = 'clamp(4rem, 14vw, 12rem)';
        setTimeout(function() {
          statement.style.fontSize = '';
        }, 1500);
      }, 3000);
    });

    document.addEventListener('keyup', function() {
      clearTimeout(holdTimer);
      activeKey = null;
    });

    // Easter egg 2: triple-click the copyright to invert colors
    let clickCount = 0;
    let clickTimer = null;
    document.querySelector('.footer-copy').addEventListener('click', function() {
      clickCount++;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(function() { clickCount = 0; }, 400);
      if (clickCount === 3) {
        document.body.style.filter = document.body.style.filter ? '' : 'invert(1)';
        clickCount = 0;
      }
    });
