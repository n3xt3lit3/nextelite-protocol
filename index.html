  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    :root { --yellow:#F5C400; --cyan:#00BADF; --blue:#3B6EF5; --pink:#E8197A; --green:#22c55e; --purple:#a855f7; }
    [data-theme="dark"] {
      --bg:#0a0a0a; --bg-raised:#111113; --card:#141416; --card-border:#1e1e22;
      --card-glass:rgba(14,14,16,0.6); --text:#e4e4e7; --text-dim:#71717a; --text-muted:#3f3f46;
      --nav-bg:rgba(10,10,10,0.85); --grain-opacity:0.03; --orb-opacity:0.7; --orb-blur:90px;
    }
    [data-theme="light"] {
      --bg:#fafafa; --bg-raised:#f4f4f5; --card:#ffffff; --card-border:#e4e4e7;
      --card-glass:rgba(255,255,255,0.6); --text:#18181b; --text-dim:#71717a; --text-muted:#a1a1aa;
      --nav-bg:rgba(250,250,250,0.85); --grain-opacity:0.02; --orb-opacity:0.5; --orb-blur:80px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; -webkit-font-smoothing:antialiased; overflow-x:hidden; transition:background 0.4s, color 0.4s; }
    a { color:inherit; text-decoration:none; }

    /* GRAIN */
    body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9998; opacity:var(--grain-opacity); background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:128px; }

    /* PRELOADER */
    .preloader { position:fixed; inset:0; z-index:99999; background:var(--bg); display:flex; align-items:center; justify-content:center; transition:opacity 0.5s, visibility 0.5s; }
    .preloader.done { opacity:0; visibility:hidden; pointer-events:none; }
    .preloader-text { font-size:0.8rem; font-weight:700; letter-spacing:2px; animation:preloaderPulse 1s ease-in-out infinite alternate; }
    @keyframes preloaderPulse { from{opacity:0.3} to{opacity:1} }

    /* SCROLL PROGRESS */
    .scroll-progress { position:fixed; top:0; left:0; height:1px; z-index:101; background:var(--text-muted); width:0; }

    /* NAV */
    nav { position:fixed; top:1rem; left:50%; transform:translateX(-50%) translateY(0); z-index:100; background:var(--nav-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid var(--card-border); border-radius:100px; padding:0.6rem 1.5rem; transition:all 0.35s ease; }
    nav.nav-hidden { transform:translateX(-50%) translateY(-120%); opacity:0; }
    .nav-inner { display:flex; align-items:center; gap:1.5rem; }
    .nav-logo { font-size:0.68rem; font-weight:700; letter-spacing:0.5px; cursor:pointer; }
    .nav-logo .c1{color:var(--text-dim);} .nav-logo .c2{color:var(--text-dim);} .nav-logo .c3{color:var(--text-dim);} .nav-logo .c4{color:var(--text-dim);}
    .nav-links { display:flex; gap:1.2rem; list-style:none; }
    .nav-links a { font-size:0.5rem; letter-spacing:1.5px; color:var(--text-muted); transition:color 0.2s; }
    .nav-links a:hover { color:var(--text); }
    .nav-right { display:flex; align-items:center; gap:0.8rem; }
    .nav-status { display:flex; align-items:center; gap:0.4rem; font-size:0.5rem; letter-spacing:1.5px; color:var(--text-muted); }
    .live-dot { width:5px; height:5px; background:var(--text-muted); border-radius:50%; animation:pulse 2.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .theme-toggle { width:36px; height:20px; border-radius:100px; border:1px solid var(--card-border); background:var(--bg-raised); cursor:pointer; position:relative; transition:all 0.3s; }
    .theme-toggle::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:var(--text-muted); transition:transform 0.3s; }
    [data-theme="light"] .theme-toggle::after { transform:translateX(16px); background:var(--text); }
    .nav-hamburger { display:none; width:28px; height:20px; flex-direction:column; justify-content:space-between; cursor:pointer; background:none; border:none; padding:0; }
    .nav-hamburger span { display:block; width:100%; height:2px; background:var(--text-muted); transition:all 0.3s; }
    .nav-hamburger.open span:nth-child(1) { transform:translateY(9px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity:0; }
    .nav-hamburger.open span:nth-child(3) { transform:translateY(-9px) rotate(-45deg); }
    .mobile-menu { position:fixed; inset:0; z-index:99; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; opacity:0; visibility:hidden; transition:all 0.3s; }
    .mobile-menu.open { opacity:1; visibility:visible; }
    .mobile-menu a { font-size:0.9rem; letter-spacing:3px; color:var(--text-dim); }
    @media(max-width:700px) { .nav-links{display:none;} .nav-hamburger{display:flex;} nav{padding:0.5rem 1rem;} }

    /* HERO */
    .hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; position:relative; overflow:hidden; }
    .hero-orb { position:absolute; width:clamp(320px,50vw,560px); aspect-ratio:1; top:50%; left:50%; transform:translate(-50%,-50%); border-radius:50%; background:conic-gradient(from 0deg, rgba(245,196,0,0.35), rgba(0,186,223,0.25), rgba(59,110,245,0.20), rgba(232,25,122,0.18), rgba(245,196,0,0.35)); filter:blur(var(--orb-blur)); animation:orbPulse 12s ease-in-out infinite alternate, orbDrift 25s ease-in-out infinite; pointer-events:none; z-index:0; }
    @keyframes orbPulse { 0%{opacity:var(--orb-opacity);transform:translate(-50%,-50%) scale(1);} 100%{opacity:var(--orb-opacity);transform:translate(-50%,-50%) scale(1.12);} }
    @keyframes orbDrift { 0%{border-radius:50%;} 25%{border-radius:42% 58% 55% 45%/55% 42% 58% 45%;} 50%{border-radius:55% 45% 42% 58%/45% 55% 45% 55%;} 75%{border-radius:45% 55% 58% 42%/58% 45% 55% 42%;} 100%{border-radius:50%;} }
    .hero > *:not(.hero-orb) { position:relative; z-index:1; }
    .hero-name { font-size:clamp(2.4rem,7vw,4.2rem); font-weight:700; letter-spacing:-1.5px; margin-bottom:0.75rem; background:linear-gradient(90deg, var(--yellow), var(--cyan), var(--blue), var(--pink), var(--purple), var(--yellow)); background-size:300% 100%; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:rainbowShift 6s linear infinite; }
    @keyframes rainbowShift { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
    .hero-sub { font-size:0.65rem; letter-spacing:5px; color:var(--text-muted); opacity:0; animation:fadeUp 1s 0.6s forwards; }
    .hero-tagline { font-size:0.85rem; letter-spacing:1px; color:var(--text-dim); margin-top:1rem; opacity:0; animation:fadeUp 1s 0.75s forwards; }
    .hero-line { width:160px; height:2px; border-radius:1px; margin-top:1.5rem; background:linear-gradient(90deg, var(--yellow), var(--cyan), var(--blue), var(--pink)); opacity:0; animation:fadeUp 1s 0.9s forwards; }
    .hero-badge { display:inline-block; margin-top:1.5rem; font-size:0.42rem; letter-spacing:3px; padding:0.4rem 1rem; border:1px solid var(--card-border); border-radius:100px; color:var(--text-muted); background:linear-gradient(90deg, rgba(245,196,0,0.05), rgba(0,186,223,0.05), rgba(232,25,122,0.05)); opacity:0; animation:fadeUp 1s 1.1s forwards; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* SECTIONS */
    .section { max-width:720px; margin:0 auto; padding:6rem 2rem; }
    .section-label { font-size:0.55rem; letter-spacing:3px; color:var(--text-muted); margin-bottom:2.5rem; display:flex; align-items:center; gap:0.6rem; }
    .section-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
    .div-line { border:none; height:1px; margin:0; background:linear-gradient(90deg, transparent, var(--card-border) 20%, var(--card-border) 80%, transparent); }
    .div-rainbow { border:none; height:1px; margin:0; background:var(--card-border); }
    .zone { background:var(--bg); transition:background 0.4s; }

    /* REVEAL */
    .reveal { opacity:0; transform:translateY(30px); transition:opacity 0.8s ease, transform 0.8s ease; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    /* STATS */
    .stats-strip { display:flex; justify-content:center; gap:3rem; padding:2rem 2rem 4rem; flex-wrap:wrap; }
    .stat-item { text-align:center; }
    .stat-num { font-size:clamp(1.8rem,4vw,2.5rem); font-weight:700; letter-spacing:-1px; }
    .stat-label { font-size:0.42rem; letter-spacing:3px; color:var(--text-muted); margin-top:0.3rem; }

    /* PILLARS */
    .pillars { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:540px) { .pillars{grid-template-columns:1fr;} }
    .pillar { background:var(--card-glass); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid var(--card-border); border-radius:12px; padding:2.5rem 2rem; display:flex; flex-direction:column; gap:0.75rem; transition:all 0.3s; cursor:pointer; border-left:3px solid transparent; }
    .pillar:hover { transform:translateY(-2px); background:var(--card); }
    .pillar[data-color="yellow"], .pillar[data-color="cyan"], .pillar[data-color="blue"], .pillar[data-color="pink"], .pillar[data-color="purple"] { border-left-color:var(--card-border); }
    .pillar-name { font-size:0.68rem; font-weight:700; letter-spacing:2px; }
    .pillar-line { width:20px; height:2px; border-radius:1px; }
    .pillar-hint { font-size:0.65rem; color:var(--text-dim); line-height:1.6; }
    .pillar-badge { font-size:0.5rem; letter-spacing:2px; color:var(--text-muted); margin-top:auto; }

    /* STACK */
    .stack-item { display:flex; align-items:center; justify-content:space-between; padding:1.25rem 0; border-bottom:1px solid var(--card-border); }
    .stack-item:last-child { border-bottom:none; }
    .stack-name { font-size:0.72rem; font-weight:700; }
    .stack-value { font-size:0.68rem; color:var(--text-dim); }

    /* X CARD */
    .x-card { display:flex; align-items:center; gap:1.5rem; padding:2rem; border:1px solid var(--card-border); border-radius:12px; transition:all 0.3s; }
    .x-card:hover { background:var(--card); }
    .x-handle { font-size:1.1rem; font-weight:700; letter-spacing:-0.5px; }
    .x-hint { font-size:0.62rem; color:var(--text-muted); letter-spacing:1.5px; flex:1; }
    .x-arrow { font-size:0.82rem; color:var(--text-muted); transition:all 0.2s; }
    .x-card:hover .x-arrow { color:var(--text); transform:translateX(4px); }

    /* STORY CARD */
    .story-card { position:relative; padding:2.8rem 2.4rem; background:var(--card); border:1px solid var(--card-border); border-radius:16px; overflow:hidden; transition:all 0.3s; cursor:pointer; }
    .story-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:var(--card-border); }
    .story-card:hover { transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,0.08); }

    /* DROP */
    .drop-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
    @media(max-width:540px) { .drop-grid{grid-template-columns:1fr;} }
    .drop-card { max-width:100%; background:var(--card-glass); backdrop-filter:blur(16px); border:1px solid var(--card-border); border-radius:12px; overflow:hidden; transition:all 0.3s; }
    .drop-card:hover { transform:translateY(-3px); }
    .drop-card-img-wrap { background:var(--bg-raised); padding:0.75rem; }
    .drop-card-img-wrap img { width:100%; display:block; }
    .drop-card-info { padding:1rem; display:flex; flex-direction:column; gap:0.3rem; }
    .drop-card-number { font-size:0.42rem; letter-spacing:3px; color:var(--text-muted); }
    .drop-card-title { font-size:0.72rem; font-weight:700; }
    .drop-card-meta { font-size:0.48rem; color:var(--text-dim); }
    .drop-card-status { font-size:0.42rem; letter-spacing:2px; color:var(--text-muted); margin-top:0.3rem; }
    .xrp-playbook-line { width:40px; height:1px; background:var(--card-border); border-radius:2px; }

    /* ROADMAP */
    .rm-progress { height:3px; border-radius:2px; background:var(--card-border); margin-bottom:2.5rem; overflow:hidden; }
    .rm-progress-bar { height:100%; border-radius:2px; background:var(--text-muted); width:0; transition:width 1.5s ease; }
    .reveal.visible .rm-progress-bar { width:65%; }
    .rm-phase-label { font-size:0.42rem; letter-spacing:3px; color:var(--text-muted); margin:2rem 0 0.75rem; }
    .rm-item { padding:0.7rem 1rem; margin:0.25rem 0; display:flex; align-items:center; gap:1rem; border-radius:8px; transition:background 0.2s; }
    .rm-item:hover { background:var(--card-glass); }
    .rm-num { font-size:0.48rem; color:var(--text-muted); letter-spacing:1px; min-width:22px; }
    .rm-name { font-size:0.68rem; font-weight:700; flex:1; }
    .rm-item.done .rm-name { color:var(--text-dim); }
    .rm-status { font-size:0.42rem; letter-spacing:2px; padding:0.25rem 0.6rem; border-radius:100px; }
    .s-done { color:var(--text-muted); background:transparent; }
    .s-active { color:var(--text-dim); background:var(--card-glass); }
    .s-upcoming { color:var(--text-muted); background:var(--bg-raised); }

    /* LOG */
    .log-entry { display:flex; gap:2rem; padding:1rem 0; border-bottom:1px solid var(--card-border); }
    .log-entry:last-child { border-bottom:none; }
    .log-date { font-size:0.55rem; letter-spacing:1.5px; color:var(--text-muted); min-width:80px; }
    .log-text { font-size:0.72rem; color:var(--text-dim); line-height:1.6; }

    /* SUBSCRIBE */
    .subscribe-card { background:var(--card-glass); backdrop-filter:blur(16px); border:1px solid var(--card-border); border-radius:12px; padding:3rem 2rem; }
    .subscribe-form { display:flex; border:1px solid var(--card-border); border-radius:12px; overflow:hidden; max-width:400px; margin:1.5rem auto 0; }
    .subscribe-form input { flex:1; background:transparent; border:none; color:var(--text); font-family:'Space Mono',monospace; font-size:0.7rem; padding:0.9rem 1rem; outline:none; }
    .subscribe-form input::placeholder { color:var(--text-muted); }
    .subscribe-form button { background:transparent; border:none; border-left:1px solid var(--card-border); color:var(--text-muted); font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:2px; padding:0.9rem 1.5rem; cursor:pointer; transition:all 0.2s; }
    .subscribe-form button:hover { color:var(--text); background:var(--card); }
    .subscribe-ok { font-size:0.6rem; color:var(--green); margin-top:1rem; display:none; text-align:center; }
    .membership-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
    @media(max-width:600px) { .membership-grid{grid-template-columns:1fr;} }

    /* SOCIALS */
    .socials { display:flex; justify-content:center; gap:1.2rem; margin-top:1.5rem; }
    .social-link { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:50%; border:1px solid var(--card-border); color:var(--text-muted); transition:all 0.2s; }
    .social-link:hover { color:var(--text); border-color:var(--text-dim); }
    .social-link svg { width:14px; height:14px; fill:currentColor; }

    /* FOOTER */
    .footer { text-align:center; padding:4rem 2rem; border-top:1px solid var(--card-border); }
    .footer-logo { font-size:0.7rem; font-weight:700; margin-bottom:0.75rem; }
    .footer-sub { font-size:0.5rem; color:var(--text-muted); letter-spacing:2px; }

    /* BACK TO TOP */
    .back-to-top { position:fixed; bottom:1.5rem; left:1.5rem; width:36px; height:36px; border-radius:50%; background:var(--card); border:1px solid var(--card-border); display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:90; opacity:0; pointer-events:none; transition:opacity 0.3s; }
    .back-to-top.visible { opacity:1; pointer-events:auto; }
    .back-to-top svg { width:14px; height:14px; stroke:var(--text-muted); fill:none; stroke-width:2; }

    /* CHATBOT */
    .chat-fab { position:fixed; bottom:1.5rem; right:1.5rem; width:48px; height:48px; border-radius:10px; background:var(--card); border:1px solid var(--card-border); cursor:pointer; z-index:9998; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .chat-fab:hover { transform:scale(1.05); border-color:var(--text-muted); }
    .chat-fab svg { width:20px; height:20px; fill:none; stroke:var(--text-dim); stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
    .chat-fab.open svg.icon-chat { display:none; }
    .chat-fab:not(.open) svg.icon-close { display:none; }
    .chat-window { position:fixed; bottom:5rem; right:1.5rem; width:400px; max-width:calc(100vw - 2rem); height:500px; max-height:calc(100vh - 8rem); background:var(--card); border:1px solid var(--card-border); border-radius:12px; z-index:9999; display:none; flex-direction:column; overflow:hidden; box-shadow:0 16px 48px rgba(0,0,0,0.15); }
    .chat-window.open { display:flex; }
    .term-bar { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1.1rem; border-bottom:1px solid var(--card-border); }
    .term-name { font-size:0.6rem; letter-spacing:1px; font-weight:700; }
    .term-close { background:none; border:none; cursor:pointer; color:var(--text-muted); display:none; padding:0.2rem; }
    .chat-messages { flex:1; overflow-y:auto; padding:1.25rem; font-size:0.7rem; line-height:1.8; color:var(--text-dim); }
    .chat-line { margin-bottom:0.5rem; white-space:pre-wrap; word-break:break-word; }
    .chat-line .prompt { color:var(--cyan); }
    .chat-line .user-cmd { color:var(--text); }
    .chat-line .response { color:var(--text-dim); }
    .chat-line .dim { color:var(--text-muted); }
    .chat-line .accent { color:var(--pink); }
    .term-input-row { display:flex; align-items:center; padding:0.7rem 1rem; border-top:1px solid var(--card-border); gap:0.5rem; }
    .term-prompt { font-size:0.7rem; color:var(--cyan); }
    .term-input { background:none; border:none; outline:none; color:var(--text); font-family:'Space Mono',monospace; font-size:0.7rem; width:100%; caret-color:var(--cyan); }
    .term-input::placeholder { color:var(--text-muted); }
    .chat-typing span { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--text-muted); margin:0 2px; animation:typingBounce 1.2s infinite; }
    .chat-typing span:nth-child(2) { animation-delay:0.15s; }
    .chat-typing span:nth-child(3) { animation-delay:0.3s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-3px)} }
    @media(max-width:500px) { .chat-window{bottom:0;right:0;width:100%;height:100%;max-width:100%;max-height:100%;border-radius:0;} .chat-fab.open{display:none;} .term-close{display:flex;} }
  </style>
</head>
<body>

  <div class="scroll-progress" id="scrollProgress"></div>
  <div class="preloader" id="preloader">
    <div class="preloader-text">next_elite<span style="color:var(--text-muted)">();</span></div>
  </div>

  <button class="chat-fab" id="chatFab" aria-label="Open terminal">
    <svg class="icon-chat" viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
    <svg class="icon-close" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

  <script>
    /* PRELOADER */
    window.addEventListener('load',function(){setTimeout(function(){document.getElementById('preloader').classList.add('done');},400);});

    /* THEME */
    var toggle=document.getElementById('themeToggle'),html=document.documentElement;
    var saved=localStorage.getItem('nextelite-theme');
    if(saved)html.setAttribute('data-theme',saved);
    toggle.addEventListener('click',function(){
      var next=html.getAttribute('data-theme')==='dark'?'light':'dark';
      html.setAttribute('data-theme',next);localStorage.setItem('nextelite-theme',next);
    });


    /* HERO TYPING */
    (function(){var text='// code your next level';var el=document.getElementById('heroComment');var i=0;setTimeout(function(){var iv=setInterval(function(){if(i<text.length){el.textContent+=text[i];i++;}else{clearInterval(iv);}},65);},1800);})();

    /* SCROLL */
    document.querySelectorAll('a[href^="#"]').forEach(function(a){a.addEventListener('click',function(e){e.preventDefault();var t=document.querySelector(a.getAttribute('href'));if(t)t.scrollIntoView({behavior:'smooth'});});});

    /* NAV AUTO-HIDE + SCROLL PROGRESS + BACK TO TOP */
    var lastY=0,navEl=document.querySelector('nav'),scrollProg=document.getElementById('scrollProgress'),btt=document.getElementById('backToTop');
    var scrollTicking=false;
    window.addEventListener('scroll',function(){
      if(!scrollTicking){requestAnimationFrame(function(){
        var sy=window.scrollY;
        if(sy>200&&sy>lastY){navEl.classList.add('nav-hidden');}else{navEl.classList.remove('nav-hidden');}
        lastY=sy;
        var docH=document.documentElement.scrollHeight-window.innerHeight;
        scrollProg.style.width=docH>0?(sy/docH*100)+'%':'0%';
        btt.classList.toggle('visible',sy>600);
        scrollTicking=false;
      });scrollTicking=true;}
    });
    btt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

    /* HAMBURGER */
    var hamburger=document.getElementById('navHamburger'),mobileMenu=document.getElementById('mobileMenu');
    hamburger.addEventListener('click',function(){hamburger.classList.toggle('open');mobileMenu.classList.toggle('open');});
    document.querySelectorAll('.mobile-nav-link').forEach(function(l){l.addEventListener('click',function(){hamburger.classList.remove('open');mobileMenu.classList.remove('open');});});

    /* CHATBOT */
    var chatFab=document.getElementById('chatFab'),chatWin=document.getElementById('chatWindow'),chatMsgs=document.getElementById('chatMessages'),chatIn=document.getElementById('chatInput'),chatOpen=false;
    var knowledge={
      about:"Nemine Steffensen — the protocol is the product. Boxing, clicker training, biohacking & building on XRPL.",
      boxing:"Boxing is trained using TagTeach — precision coaching built on positive reinforcement.",
      tagteach:"TagTeach breaks complex skills into tag points — small achievable steps marked with a 'tag'.",
      clicker:"Clicker training uses operant conditioning to shape precise behaviors in dogs.",
      dogs:"Dog training here is 100% clicker-based. Science, not dominance.",
      whoop:function(){return "WHOOP tracks recovery, strain, and sleep. The data feeds into the protocol.";},
      xrp:"Building on XRPL. Nememe #001 is the first NFT drop — 1/1, not yet minted.",
      nft:"Nememe #001 — a 1/1 NFT on XRPL. The first drop from NextElite.",
      nememe:"Nememe is the NFT/meme brand under NextElite. #001 is the genesis drop on XRPL.",
      stack:"Daily protocol: morning at 06:00, boxing, dog work, WHOOP recovery, building.",
      protocol:"NextElite is a personal protocol — not a product, a system you live.",
      ai:"AI services — build with AI, no code required.",
      story:"Started with soccer — Energikampen — evolved into the protocol.",
      sound:"Protocol playlist — boxing, focus, grind tracks on Spotify.",
      site:"Built from scratch — no frameworks. Pure HTML, CSS, JS. Open source.",
      help:"Topics: about, boxing, tagteach, clicker, whoop, xrp, nft, nememe, stack, protocol, ai, story, sound, site, stats.",
      stats:"220 days tracked. 121 boxing sessions. 403 workouts. 51 bpm resting.",
      membership:"Observer (free) and Gym Access (199 NOK/mo). Launching soon.",
      version:"NextElite Protocol v0.3 — NEMEME EDITION. Built in public."
    };
    function findAnswer(q){
      q=q.toLowerCase().replace(/[?!.,]/g,'');var words=q.split(/\s+/);
      if(/who (are you|is|made|built)/.test(q)||/what is (this|nextelite)/.test(q))return knowledge.protocol;
      var keyMap={'boxing':['boxing','box','fight'],'tagteach':['tagteach','tag teach'],'clicker':['clicker','operant','shaping'],'dogs':['dog','dogs'],'whoop':['whoop','recovery','strain','sleep','hrv'],'xrp':['xrp','xrpl','crypto','ledger'],'nft':['nft','mint','collectible'],'nememe':['nememe','meme'],'stack':['stack','routine','daily'],'protocol':['protocol','system'],'ai':['ai','automation'],'story':['story','origin','soccer'],'sound':['sound','music','spotify'],'site':['site','website','code','github'],'help':['help','commands'],'stats':['stats','numbers'],'membership':['membership','subscribe','join','price'],'version':['version','v0']};
      var best=null,bestScore=0;
      for(var key in keyMap){var score=0;keyMap[key].forEach(function(kw){if(q.indexOf(kw)!==-1)score+=2;});words.forEach(function(w){keyMap[key].forEach(function(kw){if(kw.indexOf(w)!==-1&&w.length>2)score+=1;});});if(score>bestScore){bestScore=score;best=key;}}
      if(best&&bestScore>=2){var val=knowledge[best];return typeof val==='function'?val():val;}
      var greetings=['hi','hey','hello','yo','sup','gm'];
      if(greetings.some(function(g){return q===g;}))return q==='gm'?"gm. time to grind.":"Hey. Type 'help' for topics.";
      return "Don't know that one. Type 'help'.";
    }
    function addLine(h){var el=document.createElement('div');el.className='chat-line';el.innerHTML=h;chatMsgs.appendChild(el);chatMsgs.scrollTop=chatMsgs.scrollHeight;}
    function showTyping(){var el=document.createElement('div');el.className='chat-typing';el.id='chatTyping';el.innerHTML='<span></span><span></span><span></span>';chatMsgs.appendChild(el);chatMsgs.scrollTop=chatMsgs.scrollHeight;}
    function removeTyping(){var t=document.getElementById('chatTyping');if(t)t.remove();}
    function sendChat(){var q=chatIn.value.trim();chatIn.value='';if(!q)return;addLine('<span class="prompt">&gt;</span> <span class="user-cmd">'+q+'</span>');showTyping();var answer=findAnswer(q);setTimeout(function(){removeTyping();addLine('<span class="response">'+answer+'</span>');},400+Math.random()*300);}
    addLine('<span class="accent">nextelite</span> <span class="dim">v0.3 — nememe edition</span>');
    addLine('<span class="dim">type anything to query the protocol</span>');
    document.getElementById('termClose').addEventListener('click',function(){chatOpen=false;chatFab.classList.remove('open');chatWin.classList.remove('open');});
    chatFab.addEventListener('click',function(){chatOpen=!chatOpen;chatFab.classList.toggle('open',chatOpen);chatWin.classList.toggle('open',chatOpen);if(chatOpen)setTimeout(function(){chatIn.focus();},100);});
    chatIn.addEventListener('keydown',function(e){if(e.key==='Enter')sendChat();});
    document.addEventListener('keydown',function(e){
      if(e.key==='Escape'&&chatOpen){chatOpen=false;chatFab.classList.remove('open');chatWin.classList.remove('open');}
      if(e.key==='/'&&!chatOpen&&document.activeElement.tagName!=='INPUT'){e.preventDefault();chatOpen=true;chatFab.classList.add('open');chatWin.classList.add('open');setTimeout(function(){chatIn.focus();},100);}
    });
  </script>
